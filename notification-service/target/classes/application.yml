spring:
  application:
    name: notification-service
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # Используем ErrorHandlingDeserializer вместо прямого JsonDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        # Указываем какой десериализатор использовать внутри ErrorHandlingDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: com.example.order_service.event,com.example.notification_service.event
        # Если класс в notification-service называется иначе, добавьте маппинг:
        # spring.json.type.mapping: orderCreatedEvent:com.example.notification_service.event.OrderCreatedEvent
  datasource:
    url: jdbc:postgresql://localhost:5434/notificationdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  # JPA должен быть здесь, на уровне spring, а не под datasource!
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8082

logging:
  level:
    com.example: DEBUG
